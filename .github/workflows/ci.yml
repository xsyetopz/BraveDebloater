name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Validate manifest and script syntax
        shell: pwsh
        run: ./scripts/Test-PolicyManifest.ps1

      - name: Validate behavior
        shell: pwsh
        run: ./scripts/Test-Behavior.ps1

      - name: Install PowerShell test tools
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -SkipPublisherCheck
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run Pester tests
        shell: pwsh
        run: Invoke-Pester -Path ./tests -CI

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: Invoke-ScriptAnalyzer -Path ./Invoke-BraveDebloat.ps1,./scripts,./src -Recurse -Severity Error

      - name: Dry-run extreme preset
        shell: pwsh
        run: ./Invoke-BraveDebloat.ps1 -Preset Extreme -LockShields

  source-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Brave policy templates
        shell: pwsh
        run: Invoke-WebRequest -Uri 'https://brave-browser-downloads.s3.brave.com/latest/policy_templates.zip' -OutFile policy_templates.zip

      - name: Validate manifest against official Brave templates
        shell: pwsh
        run: ./scripts/Test-LatestPolicyTemplates.ps1 -TemplateZipPath ./policy_templates.zip

  windows-powershell:
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Windows PowerShell 5.1 compatibility
        shell: powershell
        run: |
          ./scripts/Test-PolicyManifest.ps1
          ./scripts/Test-Behavior.ps1
          ./Invoke-BraveDebloat.ps1 -Preset Extreme -LockShields
