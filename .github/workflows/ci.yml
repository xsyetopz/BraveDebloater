name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate manifest and script syntax
        shell: pwsh
        run: ./scripts/Test-PolicyManifest.ps1

      - name: Dry-run aggressive preset
        shell: pwsh
        run: ./Invoke-BraveDebloat.ps1 -Preset Aggressive -LockShields
